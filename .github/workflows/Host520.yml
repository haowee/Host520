# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Host520

on:
  push:
  schedule:
    - cron: '0 */4 * * *'

jobs:
  build:

    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: [3.9]

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        if [ -f actions_requirements.txt ]; then pip install -r actions_requirements.txt; fi
    - name: run script
      run: |
        # fetch new ip content and update readme file
        python update_ips.py --platform all
    - name: commit
      id: commit
      continue-on-error: true
      run: |
        git config --global user.email host520@example.com
        git config --global user.name action_bot
        git add .
        git commit -m "update readme content"
    - name: Check on failures
      if: steps.commit.outcome == 'failure'
      run: exit 1
    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
